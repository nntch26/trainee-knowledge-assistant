services:

  postgres:
    image: postgres:16
    container_name: postgres-db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 5s # เช็คทุกกี่วินาที
      timeout: 5s
      retries: 5
      start_period: 10s


  backend:
    build: ./backend
    container_name: express-api
    command: sh -c "npx prisma migrate deploy && npm run dev"
    ports:
      - "8000:8000"
    depends_on:
    # รอให้ Postgres healthy ก่อน
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PORT: ${BACKEND_PORT}
    volumes:
      - ./backend:/app
      - /app/node_modules            
      - ./backend/uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"] 
      interval: 10s 
      timeout: 5s
      retries: 5
      start_period: 15s


  frontend:
    build:
      context: ./frontend/chat-ai-app
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        API_BASE_URL: ${API_BASE_URL}
    container_name: web-app
    ports:
      - "3000:3000"
    depends_on:
      # ให้ Frontend รอจน Backend healthy ก่อน
      backend:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PORT: ${FRONTEND_PORT}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
  uploads_data: