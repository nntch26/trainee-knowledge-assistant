services:

  postgres:
    image: postgres:16
    container_name: postgres-db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data


  backend:
    build: ./backend
    container_name: express-api
    command: sh -c "npx prisma migrate deploy && npm run dev"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      PORT: ${BACKEND_PORT}
    volumes:
      - ./backend:/app
      - /app/node_modules            
      - ./backend/uploads:/app/uploads


  frontend:
    build:
      context: ./frontend/chat-app
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: web-app
    ports:
      - "3000:3000"
    depends_on:
      - backend
    env_file:
      - .env
    environment:
      PORT: ${FRONTEND_PORT}

volumes:
  postgres_data:
  uploads_data: